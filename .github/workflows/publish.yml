name: Publish NuGet package

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 1.0.0). Leave empty for Conventional Commits."
        required: false
        type: string
      force:
        description: "Publish even if no feat/fix/breaking commit (use with version override)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  PACKAGE_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Print environment
        run: |
          dotnet --info
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"

      - name: Calculate version (Conventional Commits)
        id: semver
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.version == '' }}
        run: |
          sed -i 's/\r$//' .github/scripts/calculate-version.sh
          bash .github/scripts/calculate-version.sh

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ steps.semver.outputs.version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not determine package version."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Decide whether to release
        id: release
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BUMP="${{ steps.semver.outputs.bump }}"
          FORCE="${{ inputs.force }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$FORCE" == "true" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "$BUMP" == "none" && -n "$(git tag -l 'v*')" ]]; then
            echo "::warning::No feat/fix/breaking commits since last tag. Release skipped."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Pack
        if: steps.release.outputs.skip != 'true'
        run: |
          dotnet pack src/Fluxor.csproj \
            --configuration Release \
            --output ./artifacts \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:RepositoryUrl=https://github.com/${{ github.repository }} \
            -p:PackageProjectUrl=https://github.com/${{ github.repository }}

      - name: List artifacts
        if: steps.release.outputs.skip != 'true'
        run: ls -la artifacts/

      - name: Push to GitHub Packages
        if: steps.release.outputs.skip != 'true'
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --source "$PACKAGE_SOURCE" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Push symbols
        if: steps.release.outputs.skip != 'true'
        continue-on-error: true
        run: |
          if compgen -G "artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push artifacts/*.snupkg \
              --source "$PACKAGE_SOURCE" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate
          fi

      - name: Create git tag
        if: steps.release.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            const version = '${{ steps.version.outputs.version }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists.`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const tagObj = await github.rest.git.createTag({
              owner,
              repo,
              tag,
              message: `Release ${version}`,
              object: sha,
              type: 'commit'
            });

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: tagObj.data.sha
            });

            core.info(`Created tag ${tag} on ${sha}`);

      - name: Summary
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.release.outputs.skip }}" == "true" ]]; then
            echo "### No release" >> "$GITHUB_STEP_SUMMARY"
            echo "Workflow ran but **nothing was published**." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Common causes:" >> "$GITHUB_STEP_SUMMARY"
            echo "- Merge commit only had \`chore:\` / \`docs:\` (no \`feat:\` or \`fix:\` since last tag)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tag \`${{ steps.version.outputs.tag }}\` already exists" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Fix:** merge a commit with \`feat:\` or \`fix:\`, or run this workflow manually with a version." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Published **fluxor ${{ steps.version.outputs.version }}**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tag: \`${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Install: \`dotnet add package fluxor --version ${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Feed: \`https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json\`" >> "$GITHUB_STEP_SUMMARY"
          fi
