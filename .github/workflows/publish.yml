name: Publish NuGet package

# On merge/push to main: version from Conventional Commits → NuGet publish → git tag vX.Y.Z
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 1.0.0). Leave empty for Conventional Commits."
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Calculate version (Conventional Commits)
        id: semver
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.version == '' }}
        run: |
          sed -i 's/\r$//' .github/scripts/calculate-version.sh
          bash .github/scripts/calculate-version.sh

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ steps.semver.outputs.version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "Could not determine package version."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Skip if nothing to release
        id: tag_check
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BUMP="${{ steps.semver.outputs.bump }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${BUMP}" == "none" && -n "$(git tag -l 'v*')" ]]; then
            echo "No feat/fix/breaking commits since last tag — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Pack
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          dotnet pack src/Fluxor.csproj \
            --configuration Release \
            --output ./artifacts \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:RepositoryUrl=https://github.com/${{ github.repository }} \
            -p:PackageProjectUrl=https://github.com/${{ github.repository }}

      - name: Push to GitHub Packages
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

      - name: Push symbols
        if: steps.tag_check.outputs.skip != 'true'
        continue-on-error: true
        run: |
          if compgen -G "artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push artifacts/*.snupkg \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate
          fi

      - name: Create and push git tag
        if: steps.tag_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.tag_check.outputs.skip }}" == "true" ]]; then
            echo "### No release" >> "$GITHUB_STEP_SUMMARY"
            echo "No new version to publish. Use \`feat:\`, \`fix:\`, or a breaking change in commits merged to \`main\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Published **Fluxor ${{ steps.version.outputs.version }}**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tag: \`${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Feed: \`https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json\`" >> "$GITHUB_STEP_SUMMARY"
          fi
