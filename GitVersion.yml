# GitFlow: develop (pre-release) + main (stable releases on merge)
# Version bumps follow Conventional Commits on merge to main.
# https://www.conventionalcommits.org/

workflow: GitFlow/v1
mode: ContinuousDelivery
tag-prefix: v
next-version: 0.1.0

commit-message-incrementing: Enabled
major-version-bump-message: '(?i)\+semver:\s?(breaking|major)|(?i)BREAKING CHANGE:|(?i)^[a-z]+(\([^)]+\))?!:'
minor-version-bump-message: '(?i)\+semver:\s?(feature|minor)|(?i)^feat(\([^)]+\))?:'
patch-version-bump-message: '(?i)\+semver:\s?(fix|patch)|(?i)^fix(\([^)]+\))?:'
no-bump-message: '(?i)\+semver:\s?(none|skip)|(?i)^(chore|docs|style|refactor|perf|test|build|ci)(\([^)]+\))?:'

branches:
  main:
    regex: ^main$
    mode: ContinuousDelivery
    label: ''
    increment: Inherit
    is-release-branch: true
    source-branches: ['develop', 'release', 'hotfix']
    prevent-increment-of-merged-branch-version: true
  develop:
    regex: ^develop$
    mode: ContinuousDeployment
    label: beta
    increment: Inherit
    source-branches: ['main', 'feature', 'hotfix']
  feature:
    regex: ^features?[/-]
    mode: ContinuousDeployment
    label: alpha
    source-branches: ['develop', 'main', 'release', 'hotfix', 'feature']
